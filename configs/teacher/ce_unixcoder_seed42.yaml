model_name: microsoft/unixcoder-base
data_path: data/random_samples_splits.json
output_dir: outputs/teacher/ce_unixcoder_seed42

max_length: 512
batch_size: 32
learning_rate: 2.0e-5
epochs: 10
warmup_ratio: 0.1
weight_decay: 0.01
seed: 42
gradient_accumulation_steps: 1
fp16: true

dropout_prob: 0.1
metric_dim: 256
cosface_scale: 16.0
cosface_margin: 0.15