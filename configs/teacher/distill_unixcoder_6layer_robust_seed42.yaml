teacher_model_name: microsoft/unixcoder-base
teacher_checkpoint_dir: outputs/teacher/ce_unixcoder_seed42/best

student_model_name: microsoft/unixcoder-base
student_keep_layers: 6
data_path: data/random_samples_splits.json
output_dir: outputs/teacher/distill_unixcoder_6layer_robust_seed42

teacher_max_length: 512
student_max_length: 512
batch_size: 16
eval_batch_size: 64
learning_rate: 3.0e-5
epochs: 12
warmup_ratio: 0.1
weight_decay: 0.01
seed: 42
gradient_accumulation_steps: 1
fp16: true

temperature: 2.0
ce_weight: 0.45
kd_weight: 0.45
feature_weight: 0.1
robust_distill: true
robust_ce_weight: 0.15
robust_kd_weight: 0.35
consistency_weight: 0.15
dropout_prob: 0.1
