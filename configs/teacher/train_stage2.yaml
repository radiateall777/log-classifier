model_name: microsoft/codebert-base
data_path: data/random_samples_splits.json
stage1_checkpoint_dir: outputs/teacher/stage1/best
output_dir: outputs/teacher/stage2
hard_weights_path: outputs/teacher/stage1/hard_weights.json
max_length: 512
batch_size: 8
learning_rate: 1.0e-5
epochs: 3
warmup_ratio: 0.1
weight_decay: 0.01
seed: 42
gradient_accumulation_steps: 1
fp16: true
lambda_scl: 0.2
lambda_consistency: 0.1
scl_temperature: 0.07
consistency_temperature: 1.0
hard_gamma: 1.0
hard_max_weight: 3.0
