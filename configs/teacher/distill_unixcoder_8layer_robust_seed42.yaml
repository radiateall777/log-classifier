teacher_model_name: microsoft/unixcoder-base
teacher_checkpoint_dir: outputs/teacher/ce_unixcoder_seed42/best

student_model_name: microsoft/unixcoder-base
student_keep_layers: 8
data_path: data/random_samples_splits.json
output_dir: outputs/teacher/distill_unixcoder_8layer_robust_seed42

teacher_max_length: 512
student_max_length: 512
batch_size: 16
eval_batch_size: 64
learning_rate: 2.0e-5
epochs: 14
warmup_ratio: 0.1
weight_decay: 0.01
seed: 42
gradient_accumulation_steps: 1
fp16: true

temperature: 2.0
ce_weight: 0.35
kd_weight: 0.55
feature_weight: 0.15
hidden_state_weight: 0.15
use_rdrop: true
rdrop_weight: 0.25
label_smoothing: 0.05
dropout_prob: 0.1
